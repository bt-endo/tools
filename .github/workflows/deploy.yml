name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"] # Triggers deployment automatically whenever you push to main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Setup Pages Pipeline
        uses: actions/configure-pages@v4

      - name: Install Dependencies
        run: npm ci

      - name: Compile Static Export with Next.js
        run: npm run build

      - name: Upload Production Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Next.js compilation builds into this directory

      - name: Deploy Live to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4